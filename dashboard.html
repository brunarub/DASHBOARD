<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Posts</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1c1917;min-height:100vh}
  .page{max-width:960px;margin:0 auto;padding:24px 16px}
  h1{font-size:20px;font-weight:600;color:#1c1917}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .week-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
  .week-nav button{background:#fff;border:1px solid #e7e5e4;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;color:#44403c}
  .week-nav button:hover{background:#f5f5f4}
  .week-label{font-size:14px;font-weight:600;min-width:80px;text-align:center;color:#1c1917}
  .week-date{font-size:12px;color:#78716c}
  .summary{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
  .sum-card{background:#fff;border:1px solid #e7e5e4;border-radius:10px;padding:10px 16px;min-width:120px}
  .sum-card .val{font-size:22px;font-weight:600;color:#1c1917}
  .sum-card .lbl{font-size:11px;color:#78716c;margin-top:2px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e7e5e4;border-radius:12px;overflow:hidden}
  .card-head{padding:12px 14px 10px;border-bottom:1px solid #f5f5f4;display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:14px;font-weight:600}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
  .badge-ok{background:#dcfce7;color:#166534}
  .badge-warn{background:#fef9c3;color:#854d0e}
  .badge-no{background:#f5f5f4;color:#78716c}
  .platforms{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px}
  .plat-row{display:flex;align-items:center;gap:8px}
  .plat-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0}
  .plat-name{font-size:12px;color:#78716c;width:64px;flex-shrink:0}
  .checks{display:flex;gap:3px;flex:1;flex-wrap:wrap}
  .ck{width:19px;height:19px;border-radius:4px;border:1px solid #e7e5e4;background:#f5f5f4;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.1s;flex-shrink:0;color:#16a34a}
  .ck.done{background:#dcfce7;border-color:#bbf7d0}
  .ck:hover:not(.done){background:#e7e5e4}
  .ck-count{font-size:11px;color:#a8a29e;width:30px;text-align:right;flex-shrink:0}
  .config-screen{max-width:500px;margin:80px auto;background:#fff;border:1px solid #e7e5e4;border-radius:16px;padding:32px}
  .config-screen h2{font-size:18px;font-weight:600;margin-bottom:8px}
  .config-screen p{font-size:13px;color:#78716c;margin-bottom:24px;line-height:1.6}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;font-weight:500;color:#44403c;margin-bottom:6px}
  .field input{width:100%;padding:8px 12px;border:1px solid #e7e5e4;border-radius:8px;font-size:13px;outline:none}
  .field input:focus{border-color:#a78bfa}
  .btn-primary{width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px}
  .btn-primary:hover{background:#6d28d9}
  .status{font-size:12px;color:#ef4444;margin-top:8px;text-align:center}
  .loading{text-align:center;padding:60px;color:#78716c;font-size:14px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:6px}
  .sync-dot.off{background:#e7e5e4}
</style>
</head>
<body>

<div id="config-screen" class="config-screen">
  <h2>Configurar Supabase</h2>
  <p>Cole as credenciais do seu projeto Supabase. Você só precisa fazer isso uma vez — elas ficam salvas no navegador.</p>
  <div class="field">
    <label>Project URL</label>
    <input type="text" id="sb-url" placeholder="https://xxxxxxxxxxxx.supabase.co">
  </div>
  <div class="field">
    <label>Anon Key</label>
    <input type="text" id="sb-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
  </div>
  <button class="btn-primary" onclick="saveConfig()">Conectar</button>
  <div class="status" id="config-status"></div>
  <p style="margin-top:20px;font-size:11px;color:#a8a29e">Onde achar isso? Supabase → seu projeto → Settings → API</p>
</div>

<div id="app" style="display:none">
  <div id="loading" class="loading">Carregando dados...</div>
  <div id="dashboard" class="page" style="display:none">
    <div class="topbar">
      <h1>Posts semanais <span class="sync-dot" id="sync-dot"></span></h1>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">&#8592;</button>
        <div class="week-label" id="week-label"></div>
        <button onclick="changeWeek(1)">&#8594;</button>
      </div>
      <div class="week-date" id="week-date"></div>
    </div>
    <div class="summary" id="summary"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const PROFILES = [
  {id:'brasileiras', name:'Brasileiras', platforms:['Instagram','TikTok','Shorts']},
  {id:'brfem', name:'BR Feminino', platforms:['Instagram','TikTok','Shorts']},
  {id:'copa', name:'Copa do Brasil', platforms:['Instagram','TikTok','Shorts']},
  {id:'selfem', name:'Seleção Feminina', platforms:['Instagram']},
];
const GOAL = 24;
const PLAT_ICONS = {Instagram:'📸',TikTok:'🎵',Shorts:'▶️'};

// --- Week logic (Fri–Thu cycles) ---
const EPOCH_FRIDAY = new Date(2025, 0, 3); // 2025-01-03 local time

function getMsPerDay(){ return 86400000; }

function currentCycleFriday(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const dow = today.getDay();
  const daysSinceFri = (dow + 2) % 7; // Fri→0, Sat→1, Sun→2 … Thu→6
  const fri = new Date(today);
  fri.setDate(today.getDate() - daysSinceFri);
  return fri;
}

function getCurrentWeek(){
  const fri = currentCycleFriday();
  const diffMs = fri - EPOCH_FRIDAY;
  return Math.round(diffMs / (7 * getMsPerDay()));
}

// --- State ---
let supabaseClient = null;
let realtimeChannel = null;
let currentWeek = getCurrentWeek();
let checksData = {};
let syncing = false;

/** Returns a "dd/mm – dd/mm" string for the given week index. */
function weekDates(w){
  const fri = new Date(EPOCH_FRIDAY);
  fri.setDate(EPOCH_FRIDAY.getDate() + w * 7);
  const thu = new Date(fri);
  thu.setDate(fri.getDate() + 6); // 6 days later = Thursday
  const fmt = d => d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  return `${fmt(fri)} – ${fmt(thu)}`;
}

function rowKey(pid, pi, week){
  return `${pid}|${pi}|${week}`;
}

function saveConfig(){
  const url = document.getElementById('sb-url').value.trim();
  const key = document.getElementById('sb-key').value.trim();

  if(!url || !key){
    document.getElementById('config-status').textContent='Preencha os dois campos.';
    return;
  }

  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  initSupabase(url, key);
}

function initSupabase(url, key){
  try{
    if(!window.supabase || !window.supabase.createClient){
      throw new Error('Biblioteca do Supabase não carregou.');
    }

    supabaseClient = window.supabase.createClient(url, key);

    document.getElementById('config-screen').style.display='none';
    document.getElementById('app').style.display='block';

    loadData();
  }catch(e){
    document.getElementById('config-status').textContent='Credenciais inválidas ou biblioteca do Supabase indisponível.';
    console.error(e);
  }
}

async function loadData(){
  document.getElementById('loading').style.display='block';
  document.getElementById('dashboard').style.display='none';
  setSyncDot(false);

  try{
    const {data, error} = await supabaseClient.from('post_checks').select('*');
    if(error) throw error;

    checksData = {};
    (data||[]).forEach(r => { checksData[r.row_key] = r.count; });

    document.getElementById('loading').style.display='none';
    document.getElementById('dashboard').style.display='block';

    setSyncDot(true);
    render();
    subscribeRealtime();
  }catch(e){
    document.getElementById('loading').innerHTML = `
      <div style="max-width:420px;margin:0 auto;text-align:left">
        <p style="font-size:15px;font-weight:600;margin-bottom:8px">Erro ao conectar</p>
        <p style="font-size:13px;color:#78716c;margin-bottom:16px">${e.message}</p>
        <p style="font-size:12px;color:#a8a29e">Verifique se a tabela <code>post_checks</code> foi criada no Supabase e se as permissões RLS estão corretas.</p>
        <button onclick="resetConfig()" style="margin-top:16px;padding:8px 16px;border:1px solid #e7e5e4;border-radius:8px;background:#fff;cursor:pointer;font-size:13px">Reconfigurar</button>
      </div>`;
    console.error(e);
  }
}

function subscribeRealtime(){
  if(!supabaseClient) return;

  if(realtimeChannel){
    supabaseClient.removeChannel(realtimeChannel);
  }

  realtimeChannel = supabaseClient
    .channel('post_checks_changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'post_checks'},payload=>{
      const r = payload.new || payload.old;
      if(!r) return;

      if(payload.eventType==='DELETE'){
        delete checksData[r.row_key];
      }else{
        checksData[r.row_key] = r.count;
      }

      render();
    })
    .subscribe();
}

function setSyncDot(on){
  const d = document.getElementById('sync-dot');
  if(d){ d.className = 'sync-dot'+(on?'':' off'); }
}

async function setChecks(pid, pi, week, val){
  const k = rowKey(pid, pi, week);
  checksData[k] = val;
  render();
  setSyncDot(false);

  try{
    const {error} = await supabaseClient
      .from('post_checks')
      .upsert({row_key:k,count:val},{onConflict:'row_key'});

    if(error) throw error;
    setSyncDot(true);
  }catch(e){
    setSyncDot(false);
    console.error(e);
    alert('Erro ao salvar no Supabase: ' + e.message);
  }
}

function getChecks(pid, pi, week){
  return checksData[rowKey(pid,pi,week)] || 0;
}

function changeWeek(d){
  currentWeek = currentWeek + d;
  render();
}

function resetConfig(){
  localStorage.removeItem('sb_url');
  localStorage.removeItem('sb_key');
  location.reload();
}

function render(){
  document.getElementById('week-label').textContent = `Sem. ${currentWeek}`;
  document.getElementById('week-date').textContent = weekDates(currentWeek);

  let totalDone=0, totalGoal=0;

  PROFILES.forEach(p=>{
    totalGoal += p.platforms.length * GOAL;
    p.platforms.forEach((_,i)=>{
      totalDone += getChecks(p.id,i,currentWeek);
    });
  });

  const pct = totalGoal ? Math.round(totalDone/totalGoal*100) : 0;

  document.getElementById('summary').innerHTML = `
    <div class="sum-card"><div class="val">${totalDone}/${totalGoal}</div><div class="lbl">posts esta semana</div></div>
    <div class="sum-card"><div class="val">${pct}%</div><div class="lbl">meta atingida</div></div>
    <div class="sum-card"><div class="val">${PROFILES.length}</div><div class="lbl">perfis ativos</div></div>`;

  document.getElementById('grid').innerHTML = PROFILES.map(p=>{
    const done = p.platforms.reduce((s,_,i)=>s+getChecks(p.id,i,currentWeek),0);
    const goal = p.platforms.length*GOAL;
    const bc = done>=goal?'badge-ok':done>0?'badge-warn':'badge-no';
    const bt = done>=goal?'✓ Meta atingida':done>0?`${done}/${goal}`:'Pendente';

    const plats = p.platforms.map((pl,pi)=>{
      const cnt = getChecks(p.id,pi,currentWeek);
      const cks = Array.from({length:GOAL},(_,ci)=>{
        const chk = ci<cnt;
        return `<div class="ck${chk?' done':''}" onclick="handleClick('${p.id}',${pi},${ci})" title="Post ${ci+1}">${chk?'✓':''}</div>`;
      }).join('');

      return `<div class="plat-row">
        <div class="plat-icon">${PLAT_ICONS[pl]||'📄'}</div>
        <div class="plat-name">${pl}</div>
        <div class="checks">${cks}</div>
        <div class="ck-count">${cnt}/${GOAL}</div>
      </div>`;
    }).join('');

    return `<div class="card">
      <div class="card-head"><div class="card-title">${p.name}</div><div class="badge ${bc}">${bt}</div></div>
      <div class="platforms">${plats}</div>
    </div>`;
  }).join('');
}

function handleClick(pid, pi, ci){
  const cur = getChecks(pid, pi, currentWeek);
  const nv = ci < cur ? ci : ci+1;
  setChecks(pid, pi, currentWeek, nv);
}

// Init
const savedUrl = localStorage.getItem('sb_url');
const savedKey = localStorage.getItem('sb_key');

if(savedUrl && savedKey){
  document.getElementById('sb-url').value = savedUrl;
  document.getElementById('sb-key').value = savedKey;
  initSupabase(savedUrl, savedKey);
}
</script>
</body>
</html>
